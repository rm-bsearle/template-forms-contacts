<div class="content">
  <h1 class="header">
    Edit Contact
  </h1>
  <form (ngSubmit)="saveContact(contactForm)" #contactForm="ngForm" >
    <section>
      <nav>Name/Info</nav>
      <div>
        <input type="hidden" [ngModel]="contact.id" name="id" />
        <input placeholder="First Name" [(ngModel)]="contact.firstName" name="firstName" />
        <input placeholder="Last Name" [(ngModel)]="contact.lastName" name="lastName" />
        <input placeholder="Date of Birth" [(ngModel)]="contact.dateOfBirth" name="dateOfBirth" />
        <input type="number"placeholder="Favorites Ranking" [(ngModel)]="contact.favoritesRanking" name="favoritesRanking" />
        <div>
          <input type="checkbox" [(ngModel)]="contact.personal" name="personal" /> Personal
        </div>
      </div>
    </section>
    <section>
      <nav>Phone</nav>
      <div class="flex-column" ngModelGroup="phone">
        <div class="flex-group">
          <input placeholder="Phone" [(ngModel)]="contact.phone.phoneNumber" name="phoneNumber" />
          <img src="/assets/plus-grey-blue.png" class="add" />
        </div>
        <div class="radio">
          @for(phoneType of phoneTypes; track phoneType.value) {
            <input type="radio" [value]="phoneType.value" [(ngModel)]="contact.phone.phoneType" name="phoneType"> {{phoneType.title}}
          }
        </div>
      </div>
    </section>
    <section>
      <nav>Address</nav>
      <div>
        <div class="address" ngModelGroup="address">
          <div class="flex-group">
            <input placeholder="Address" [(ngModel)]="contact.address.streetAddress" name="streetAddress" />
            <img src="/assets/plus-grey-blue.png" class="add" />
          </div>
          <input placeholder="City" [(ngModel)]="contact.address.city" name="city" />
          <input placeholder="State/Region" [(ngModel)]="contact.address.state" name="state" />
          <input placeholder="Zip/Postal Code" [(ngModel)]="contact.address.postalCode" name="postalCode" />
          <select [(ngModel)]="contact.address.addressType" name="addressType">
            @for(addressType of addressTypes; track addressType.value) {
              <option [value]="addressType.value">{{addressType.title}}</option>
            }
          </select>
        </div>
      </div>
    </section>
    <!-- Can use if statement or css to handle when to display
      @if(!contactForm.submitted) {
        <button class="secondary" type="button">Cancel</button>
        <button class="primary" type="save">Save</button>
      } @else {
        <button disabled>Saving...</button>
      }
    -->
        <button class="secondary" type="button">Cancel</button>
        <button class="primary" type="save">Save</button>
        <button class="saving" disabled>Saving...</button>
  </form>
  <div class="buttons">
  </div>
</div>
